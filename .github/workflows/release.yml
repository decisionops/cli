name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact_name: dops-linux-x64
            binary_path: dist/dops
          - runner: ubuntu-24.04-arm
            artifact_name: dops-linux-arm64
            binary_path: dist/dops
          - runner: macos-13
            artifact_name: dops-darwin-x64
            binary_path: dist/dops
          - runner: macos-14
            artifact_name: dops-darwin-arm64
            binary_path: dist/dops
          - runner: windows-latest
            artifact_name: dops-windows-x64.exe
            binary_path: dist/dops.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build release binary
        run: |
          pyinstaller --onefile --name dops dops_bootstrap.py

      - name: Rename artifact
        shell: bash
        run: |
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Publish GitHub release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
